# Intentionally broken Pod for the "Troubleshoot with Kiro" moment.
#
# The image tag is bogus on purpose -> ImagePullBackOff.
# This creates a clean, visually obvious failure in the EKS console that Kiro
# (via the awslabs EKS MCP server) can root-cause instantly.
#
# Deploy with:
#   kubectl apply -f manifests/broken-app.yaml
# or via ArgoCD by committing this file into the Git repo ArgoCD is watching.

apiVersion: v1
kind: Namespace
metadata:
  name: demo-broken
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: demo-broken
  labels:
    app: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
        - name: checkout
          # This tag does not exist -> ImagePullBackOff
          image: public.ecr.aws/docker/library/nginx:this-tag-does-not-exist
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: demo-broken
spec:
  type: ClusterIP
  selector:
    app: checkout
  ports:
    - port: 80
      targetPort: 80
